name: Auto Repost (Schedule)

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Japanese Fonts
        run: sudo apt-get install -y fonts-ipafont
        
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          
      - name: Run Script
        env:
          SITE_USER_ID: ${{ secrets.SITE_USER_ID }}
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
          TARGET_AREAS: "北海道, 東北, 北関東, 埼玉県, 千葉県, 東京都, 池袋, 新宿, 多摩, 神奈川県, イケメン, 静岡県, 甲信越北陸, 愛知県, 栄, 岐阜三重, 大阪府, 日本橋, 兵庫県, 関西, 中国, 四国, 福岡県, 九州, 海外"
        run: python -u main.py

      - name: Upload Error Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshots
          path: "*.png"
          retention-days: 3
          if-no-files-found: ignore
